window:
  width: 1280
  height: 960
  asideWidth: 300
  positionX: 10
  positionY: 20
  maximized: false
general:
  theme: auto
  language: auto
  font:
    size: 14
  confirmDestructive: true
editor:
  font:
    size: 14
  lineNumbers: true
  showFolding: false
  dropText: false
  links: false
query:
  defaultLimit: 42
  defaultPageSize: 25
  queryEngine: builtin
terminal:
  font:
    size: 14
  cursorStyle: block
workspaces:
  fileExtensions:
    - .js
    - .mongodb
updates:
  frequency: daily
logging:
  level: info
  consoleEnabled: false
  fileEnabled: true
  maxSizeMB: 10
  maxBackups: 5