name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label for this build (e.g. 1.0.0)'
        required: false
        default: 'dev'

permissions:
  contents: write

env:
  GO_VERSION: '1.24'
  WAILS_VERSION: 'v2.12.0'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            arch: amd64
          - os: windows-latest
            platform: windows/arm64
            arch: arm64
          - os: ubuntu-22.04
            platform: linux/amd64
            arch: amd64
          - os: macos-latest
            platform: darwin/arm64
            arch: arm64
          - os: macos-15-intel
            platform: darwin/amd64
            arch: amd64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      # ── Determine version ──
      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            version="${{ github.ref_name }}"
            version="${version#v}"
          else
            version="${{ github.event.inputs.version || 'dev' }}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Version: $version"

      - name: Stamp version into wails.json
        shell: bash
        run: |
          jq '.info.productVersion = "${{ steps.version.outputs.version }}"' wails.json > tmp.json
          mv tmp.json wails.json

      # ── Linux dependencies ──
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgtk-3-dev libwebkit2gtk-4.0-dev pkg-config libfuse-dev libfuse2

      # ── macOS dependencies ──
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install create-dmg

      # ── Windows dependencies ──
      - name: Install NSIS
        if: runner.os == 'Windows'
        run: choco install nsis jq --no-progress

      # ── Build ──
      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          export PATH="/c/Program Files (x86)/NSIS:$PATH"
          wails build -nsis -webview2 embed -platform ${{ matrix.platform }} \
            -ldflags "-X main.version=v${{ steps.version.outputs.version }}"

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: |
          wails build -platform ${{ matrix.platform }} \
            -ldflags "-X main.version=v${{ steps.version.outputs.version }}"

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          wails build -platform ${{ matrix.platform }} \
            -ldflags "-X main.version=v${{ steps.version.outputs.version }}"

      # ── Package: Windows ──
      - name: Package Windows portable zip
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive "build/bin/Vervet.exe" "Vervet-windows-${{ matrix.arch }}-portable.zip"

      - name: Rename Windows installer
        if: runner.os == 'Windows'
        shell: bash
        run: mv "build/bin/Vervet-${{ matrix.arch }}-installer.exe" "Vervet-windows-${{ matrix.arch }}-installer.exe"

      # ── Package: Linux AppImage ──
      - name: Package AppImage
        if: runner.os == 'Linux'
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
          DEPLOY_GTK_VERSION: "3"
        run: |
          # Download linuxdeploy and GTK plugin
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/1-alpha-20240109-1/linuxdeploy-x86_64.AppImage -O linuxdeploy
          chmod +x linuxdeploy

          wget -q https://raw.githubusercontent.com/tauri-apps/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh
          chmod +x linuxdeploy-plugin-gtk.sh

          # Workaround: add WEBKIT_DISABLE_COMPOSITING_MODE to GTK plugin
          sed -i '/XDG_DATA_DIRS/a export WEBKIT_DISABLE_COMPOSITING_MODE=1' linuxdeploy-plugin-gtk.sh

          # Initial linuxdeploy run to set up AppDir
          ./linuxdeploy --appdir AppDir

          # Copy WebKit process binaries into AppDir
          pushd AppDir
          find /usr/lib* -name WebKitNetworkProcess -exec mkdir -p $(dirname '{}') \; -exec cp --parents '{}' "." \; || true
          find /usr/lib* -name WebKitWebProcess -exec mkdir -p $(dirname '{}') \; -exec cp --parents '{}' "." \; || true
          find /usr/lib* -name libwebkit2gtkinjectedbundle.so -exec mkdir -p $(dirname '{}') \; -exec cp --parents '{}' "." \; || true
          popd

          # Download AppRun binary
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/AppRun-x86_64 -O AppDir/AppRun
          chmod +x AppDir/AppRun

          # Resize icon to 512x512 (linuxdeploy rejects >512)
          convert build/appicon.png -resize 512x512 build/Vervet-512.png

          # Copy icon to hicolor directory
          mkdir -p AppDir/usr/share/icons/hicolor/512x512/apps
          cp build/Vervet-512.png AppDir/usr/share/icons/hicolor/512x512/apps/Vervet.png

          # Copy binary
          mkdir -p AppDir/usr/bin
          cp build/bin/Vervet AppDir/usr/bin/

          # Run linuxdeploy with GTK plugin to produce AppImage
          ./linuxdeploy --appdir AppDir \
            --output appimage \
            --plugin gtk \
            -e build/bin/Vervet \
            -d build/linux/Vervet.desktop \
            -i build/Vervet-512.png

          # Rename output (linuxdeploy names it based on the desktop file)
          mv Vervet-x86_64.AppImage "Vervet-linux-amd64.AppImage"

      # ── Package: Linux .deb ──
      - name: Package deb
        if: runner.os == 'Linux'
        run: |
          DEB_DIR="vervet_${{ steps.version.outputs.version }}_amd64"
          mkdir -p "$DEB_DIR/DEBIAN"
          mkdir -p "$DEB_DIR/usr/bin"
          mkdir -p "$DEB_DIR/usr/share/applications"
          mkdir -p "$DEB_DIR/usr/share/icons/hicolor/512x512/apps"

          # Control file with version substituted
          sed "s/VERSION_PLACEHOLDER/${{ steps.version.outputs.version }}/" build/linux/control > "$DEB_DIR/DEBIAN/control"

          # Binary, desktop file, icon
          cp build/bin/Vervet "$DEB_DIR/usr/bin/Vervet"
          cp build/linux/Vervet.desktop "$DEB_DIR/usr/share/applications/Vervet.desktop"
          cp build/appicon.png "$DEB_DIR/usr/share/icons/hicolor/512x512/apps/vervet.png"

          dpkg-deb --build -Zxz "$DEB_DIR"
          mv "${DEB_DIR}.deb" "Vervet-linux-amd64.deb"

      # ── Package: Linux .rpm ──
      - name: Package rpm
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y rpm

          VERSION="${{ steps.version.outputs.version }}"

          # Create tarball with directory name matching spec (name-version)
          mkdir -p "vervet-$VERSION"
          cp build/bin/Vervet "vervet-$VERSION/"
          cp build/linux/Vervet.desktop "vervet-$VERSION/"
          cp build/appicon.png "vervet-$VERSION/vervet.png"
          tar czf "vervet-$VERSION.tar.gz" "vervet-$VERSION/"

          # Set up rpmbuild tree
          mkdir -p ~/rpmbuild/{SOURCES,SPECS,SRPMS,RPMS}
          cp "vervet-$VERSION.tar.gz" ~/rpmbuild/SOURCES/
          sed "s/VERSION_PLACEHOLDER/$VERSION/" build/linux/vervet.spec > ~/rpmbuild/SPECS/vervet.spec

          # Build binary and source RPM
          rpmbuild -ba ~/rpmbuild/SPECS/vervet.spec

          cp ~/rpmbuild/RPMS/x86_64/vervet-*.rpm "Vervet-linux-amd64.rpm"
          cp ~/rpmbuild/SRPMS/vervet-*.src.rpm "Vervet-linux-amd64.src.rpm"

      # ── Package: macOS DMG ──
      - name: Package DMG
        if: runner.os == 'macOS'
        run: |
          create-dmg \
            --volname "Vervet" \
            --no-internet-enable \
            --app-drop-link 480 180 \
            "Vervet-macos-${{ matrix.arch }}.dmg" \
            "build/bin/"

      # ── Upload ──
      - name: Upload Windows installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: Vervet-windows-${{ matrix.arch }}-installer.exe
          path: Vervet-windows-${{ matrix.arch }}-installer.exe
          if-no-files-found: error

      - name: Upload Windows portable
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: Vervet-windows-${{ matrix.arch }}-portable.zip
          path: Vervet-windows-${{ matrix.arch }}-portable.zip
          if-no-files-found: error

      - name: Upload Linux AppImage
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: Vervet-linux-amd64.AppImage
          path: Vervet-linux-amd64.AppImage
          if-no-files-found: error

      - name: Upload Linux deb
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: Vervet-linux-amd64.deb
          path: Vervet-linux-amd64.deb
          if-no-files-found: error

      - name: Upload Linux rpm
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: Vervet-linux-amd64.rpm
          path: Vervet-linux-amd64.rpm
          if-no-files-found: error

      - name: Upload Linux src.rpm
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: Vervet-linux-amd64.src.rpm
          path: Vervet-linux-amd64.src.rpm
          if-no-files-found: error

      - name: Upload macOS DMG
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: Vervet-macos-${{ matrix.arch }}.dmg
          path: Vervet-macos-${{ matrix.arch }}.dmg
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          draft: true
          generate_release_notes: true
          files: artifacts/*

      - name: Upload RPM to COPR
        run: |
          sudo apt-get install -y python3-pip
          pip install copr-cli

          mkdir -p ~/.config
          cat > ~/.config/copr <<COPR_EOF
          [copr-cli]
          login = ${{ secrets.COPR_LOGIN }}
          username = ${{ secrets.COPR_USERNAME }}
          token = ${{ secrets.COPR_TOKEN }}
          copr_url = https://copr.fedorainfracloud.org
          COPR_EOF
          sed -i 's/^[[:space:]]*//' ~/.config/copr

          copr-cli build blacktau/vervet artifacts/Vervet-linux-amd64.src.rpm
