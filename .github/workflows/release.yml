name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label for this build (e.g. 1.0.0)'
        required: false
        default: 'dev'

permissions:
  contents: write

env:
  GO_VERSION: '1.24'
  WAILS_VERSION: 'v2.10.2'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            output-name: Vervet-windows-amd64-installer.exe
          - os: ubuntu-22.04
            platform: linux/amd64
            output-name: Vervet-linux-amd64.AppImage
          - os: macos-latest
            platform: darwin/arm64
            output-name: Vervet-macos-arm64.dmg

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      # ── Linux dependencies ──
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgtk-3-dev libwebkit2gtk-4.0-dev pkg-config

      # ── macOS dependencies ──
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install create-dmg

      # ── Windows dependencies ──
      - name: Install NSIS
        if: runner.os == 'Windows'
        run: choco install nsis --no-progress

      # ── Build ──
      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: wails build -nsis -platform ${{ matrix.platform }}

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: wails build -platform ${{ matrix.platform }}

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: wails build -platform ${{ matrix.platform }}

      # ── Package: Linux AppImage ──
      - name: Package AppImage
        if: runner.os == 'Linux'
        run: |
          # Download appimagetool
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool

          # Create AppDir structure
          mkdir -p Vervet.AppDir/usr/bin
          cp build/bin/Vervet Vervet.AppDir/usr/bin/Vervet
          cp build/appicon.png Vervet.AppDir/Vervet.png
          cp build/linux/Vervet.desktop Vervet.AppDir/Vervet.desktop

          # Create AppRun (use printf to avoid heredoc indentation issues)
          printf '#!/bin/sh\nexec "${APPDIR}/usr/bin/Vervet" "$@"\n' > Vervet.AppDir/AppRun
          chmod +x Vervet.AppDir/AppRun

          # Build AppImage
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run Vervet.AppDir ${{ matrix.output-name }}

      # ── Package: macOS DMG ──
      - name: Package DMG
        if: runner.os == 'macOS'
        run: |
          create-dmg \
            --volname "Vervet" \
            --no-internet-enable \
            "${{ matrix.output-name }}" \
            "build/bin/"

      # ── Package: Windows (rename installer) ──
      - name: Rename Windows installer
        if: runner.os == 'Windows'
        shell: bash
        run: mv build/bin/Vervet-amd64-installer.exe "${{ matrix.output-name }}"

      # ── Upload ──
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output-name }}
          path: ${{ matrix.output-name }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: artifacts/*
